name: genshin_import
description: "Genshin Import — Teyvat Marketplace. A Genshin Impact themed e-commerce app for weapons and artifacts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Fonts & UI
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Charts (Admin dashboard)
  fl_chart: ^0.70.0

  # Image picker (Admin upload)
  image_picker: ^1.1.2

  # Local persistence
  shared_preferences: ^2.3.2

  # HTTP client
  http: ^1.2.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0

  #GoogleOauth
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
